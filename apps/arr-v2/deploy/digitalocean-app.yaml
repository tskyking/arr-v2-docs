# Draft DigitalOcean App Platform spec for ARR-V2.
# Replace github.repo/branch placeholders before applying.
name: arr-v2
region: nyc

services:
  - name: arr-v2-api
    github:
      repo: REPLACE_WITH_GITHUB_OWNER_REPO
      branch: main
      deploy_on_push: true
    source_dir: apps/arr-v2/backend
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: API_PREFIX
        value: /api
        scope: RUN_TIME
      - key: DATA_DIR
        value: /workspace/data
        scope: RUN_TIME
      - key: MAX_BODY_BYTES
        value: "52428800"
        scope: RUN_TIME

static_sites:
  - name: arr-v2-web
    github:
      repo: REPLACE_WITH_GITHUB_OWNER_REPO
      branch: main
      deploy_on_push: true
    source_dir: apps/arr-v2/frontend
    build_command: npm ci && VITE_BASE_PATH=/ VITE_API_BASE_PATH=/api npm run build
    output_dir: dist
    routes:
      - path: /
