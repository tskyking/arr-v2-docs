<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening ARR V2…</title>
    <script>
      (function () {
        var path = window.location.pathname || '/';
        var search = window.location.search || '';
        var spaPrefixes = ['/import', '/dashboard', '/review', '/customers', '/customer-cube'];
        var isSpaRoute = spaPrefixes.some(function (prefix) {
          return path === prefix || path.indexOf(prefix + '/') === 0;
        });

        if (isSpaRoute && !window.location.hash) {
          window.location.replace('/#' + path + search);
        }
      })();
    </script>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1117;
        color: #e2e8f0;
        font: 14px/1.6 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 560px;
        padding: 32px;
        border: 1px solid #2a2d3e;
        border-radius: 12px;
        background: #1a1d27;
        text-align: center;
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 18px; color: #8892a4; }
      a { color: #818cf8; font-weight: 700; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening ARR V2…</h1>
      <p>If you are not redirected automatically, open the dashboard from the app home.</p>
      <a href="/#/import">Go to ARR V2</a>
    </main>
  </body>
</html>
